# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

monitorv2 {
    output = DP-1
    mode = 3440x1440@175
    position = 0x0
    scale = 1
    vrr = 2
    bitdepth = 10
    # enable HDR
    # cm = hdredid
    sdrbrightness = 1.0
    sdrsaturation = 1.0
    supports_hdr = 1
    supports_wide_color = 1
    sdr_min_luminance = 0.005
    sdr_max_luminance = 225
    min_luminance = 0
    max_luminance = 400
    max_avg_luminance = 225
}

render {
    cm_fs_passthrough = 2
    direct_scanout = 2
    cm_auto_hdr = 2
}

$terminal = kitty

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# uwsm is used so hypridle, hyprpolkitagent
# are started as systemd-services, see the hyprland-wiki
exec-once = hyprpm reload -n
# required for polkit access, some apps (like nextcloud-client), run on startup and
# try to connect to a polkit instance
exec-once = uwsm app -- keepassxc
# usb-automount
exec-once = uwsm app -- udiskie
# bar/fancy desktop widgets noctalia
exec-once = uwsm app -- qs -c noctalia-shell

general {
    gaps_in = 2
    gaps_out = 2 
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    # use github.com/outfoxxed/hy3 to get i3wm tiling behaviour
    layout = hy3
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.7

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# fix blackscreen on notifications in fullscreen
# TODO: NOT COMPLETELY FIXED
layerrule {                                                                                                                                 
  name = fix_notification_blackscreen
  no_anim = on                                                                                                                            
  match:namespace = notifications                                                                                                         
}  

# noctalia settings
layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

# start applications always on the same workspace
windowrule = match:class ^(firefox)$, workspace 2
windowrule = match:class ^(KeePassXC|1password)$, workspace 4
windowrule = match:class ^(Freelens|yaak-app)$, workspace 5
windowrule = match:class ^(teams-for-linux|spotify)$, workspace 6
windowrule = match:class ^(steam)$, workspace 10

# special workspace and no border fullscreen for steam-games
windowrule = match:class ^steam_app_\d+$, workspace 10, fullscreen on, idle_inhibit always
workspace = 10, border:false, rounding:false

# define floating windows
windowrule = match:class hyprland-share-picker, float on
windowrule = match:class lxqt-openssh-askpass, float on
windowrule = match:class org.twosheds.iwgtk, float on
# PiP-player without opacity and always on top
windowrule = match:class firefox, match:title Picture-in-Picture, float on, pin on, opacity 100.0
windowrule = match:class firefox, match:title Library, float on

# Show me the Key app
# https://github.com/AlynxZhou/showmethekey
# To get more information about a window’s class, title, XWayland status or its size, you can use `hyprctl clients`. (From Hyprland Wiki)
windowrule = match:class ^(one.alynx.showmethekey)$,float on
windowrule = match:class ^(showmethekey-gtk)$, float on # make window floating
windowrule = match:class ^(showmethekey-gtk)$, pin on # pin window

cursor {
    no_break_fs_vrr = 1
    min_refresh_rate = 60
}

misc {
    force_default_wallpaper = 0 # disable the anime mascot wallpapers
    disable_hyprland_logo = true # disables the random hyprland logo / anime girl background
    vfr = on
    vrr = 1
}

input {
    kb_layout = us,de
    # use caps-lock as escape key
    # change keyboard layout on alt+space
    kb_options = caps:escape,grp:alt_space_toggle
    kb_rules =
    # faster key repeat
    repeat_rate=50
    repeat_delay=200

    follow_mouse = 0

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }

}

# See https://wiki.hyprland.org/Configuring/Keywords/
$mod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod+SHIFT, 1, movetoworkspacesilent, 1
bind = $mod+SHIFT, 2, movetoworkspacesilent, 2
bind = $mod+SHIFT, 3, movetoworkspacesilent, 3
bind = $mod+SHIFT, 4, movetoworkspacesilent, 4
bind = $mod+SHIFT, 5, movetoworkspacesilent, 5
bind = $mod+SHIFT, 6, movetoworkspacesilent, 6
bind = $mod+SHIFT, 7, movetoworkspacesilent, 7
bind = $mod+SHIFT, 8, movetoworkspacesilent, 8
bind = $mod+SHIFT, 9, movetoworkspacesilent, 9
bind = $mod+SHIFT, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
# bind = $mod, S, togglespecialworkspace, magic
# bind = $mod SHIFT, S, movetoworkspace, special:magic

# Move windows with mod + LMB
bindm = $mod, mouse:272, movewindow
# resize windows with mod + RMB 
bindm = $mod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mod+SHIFT, m, exit
bind = $mod, return, exec, $terminal

# see <https://github.com/outfoxxed/hy3>
plugin {
    hy3 {
            tabs {
              border_width = 1
                col.active = rgba(33ccff20)
                col.border.active = rgba(33ccffee)
                col.text.active = rgba(ffffffff)
                col.inactive = rgba(30303020)
                col.border.inactive = rgba(595959aa)
            }

        autotile {
            enable = false
        }
    }
} 

bind = $mod+SHIFT, q, hy3:killactive # close all windows in active node
bind = $mod, tab, hy3:togglefocuslayer
bind = $mod, b, hy3:makegroup, h
bind = $mod, v, hy3:makegroup, v
bind = $mod, z, hy3:makegroup, tab
bind = $mod, a, hy3:changefocus, raise # focus parent window in addition to current window
bind = $mod+SHIFT, a, hy3:changefocus, lower
bind = $mod, w, hy3:changegroup, toggletab
bind = $mod, e, hy3:changegroup, opposite
bind = $mod+SHIFT, e, hy3:expand, base
bindn = , mouse:272, hy3:focustab, mouse
bindn = , mouse_down, hy3:focustab, l, require_hovered
bindn = , mouse_up, hy3:focustab, r, require_hovered
bind = $mod, q, hy3:warpcursor # moves the cursor in the middle of the active window

bind = $mod, i, exec, hyprctl keyword plugin:hy3:tabs:height 20
bind = $mod, i, exec, hyprctl keyword plugin:hy3:tabs:render_text true
bind = $mod, o, exec, hyprctl keyword plugin:hy3:tabs:height 20
bind = $mod, o, exec, hyprctl keyword plugin:hy3:tabs:render_text true

bindr = $mod, o, exec, hyprctl keyword plugin:hy3:tabs:height 2
bindr = $mod, o, exec, hyprctl keyword plugin:hy3:tabs:render_text false

bind = $mod, h, hy3:movefocus, l
bind = $mod, j, hy3:movefocus, d
bind = $mod, k, hy3:movefocus, u
bind = $mod, l, hy3:movefocus, r
bind = $mod, left, hy3:movefocus, l
bind = $mod, down, hy3:movefocus, d
bind = $mod, up, hy3:movefocus, u
bind = $mod, right, hy3:movefocus, r

bind = $mod+SHIFT, h, hy3:movewindow, l, once
bind = $mod+SHIFT, j, hy3:movewindow, d, once
bind = $mod+SHIFT, k, hy3:movewindow, u, once
bind = $mod+SHIFT, l, hy3:movewindow, r, once
bind = $mod+SHIFT, left, hy3:movewindow, l, once
bind = $mod+SHIFT, down, hy3:movewindow, d, once
bind = $mod+SHIFT, up, hy3:movewindow, u, once
bind = $mod+SHIFT, right, hy3:movewindow, r, once

# noctalia <https://docs.noctalia.dev/>
$ipc = qs -c noctalia-shell ipc call

# noctalia keybinds <https://docs.noctalia.dev/getting-started/keybinds/>
bind = $mod, d, exec, $ipc launcher toggle # open launcher
bind = $mod, PERIOD, exec, $ipc lockScreen lock # lock system
bind = $mod, COMMA, exec, $ipc sessionMenu lockAndSuspend # suspend system

# screenshots using hyprshot
bind = $mod+SHIFT, PRINT, exec, hyprshot -m region  
bind = $mod+SHIFT, F12, exec, hyprshot -m region  

bind = $mod, f, fullscreen, 1
bind = $mod+SHIFT, f, fullscreen, 0
bind = $mod+SHIFT, space, togglefloating


# resize windows
bind = $mod, R,submap,resize
submap=resize
binde = , l, resizeactive, 30 0
binde = , h, resizeactive, -30 0
binde = , k, resizeactive, 0 -30
binde = , j, resizeactive, 0 30
binde = , left, resizeactive, -30 0
binde = , right, resizeactive, 30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
bind = , Return,submap,reset
bind = , escape,submap,reset
submap=reset

# import colors set by noctalia theme-switcher
source = /home/phil/.config/hypr/noctalia/noctalia-colors.conf
